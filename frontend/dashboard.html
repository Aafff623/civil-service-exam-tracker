<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 公务员考试学习跟踪系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>个人主页</h1>
            <nav>
                <a href="resources.html" class="btn btn-secondary">资源库</a>
                <button id="logout-btn" class="btn btn-secondary">退出登录</button>
            </nav>
        </header>
        <div class="dashboard">

            </div>

                <h2>学习进度</h2>

            </div>
            <div class="card">
                <h2>弱项分析</h2>
                <p>暂无数据。</p>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
