<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/auth.css" />
</head>
<body>
  <div class="auth-page">
    <section class="auth-brand">
      <div class="auth-brand-grid" aria-hidden="true"></div>
      <div class="auth-brand-top">
        <span class="logo-mark"><img src="assets/brand-mark.svg" width="38" height="38" alt="" /></span>
        <div class="logo-text">
          <strong>备考跟踪</strong>
          <span>Exam Prep Tracker</span>
        </div>
      </div>

      <div class="auth-brand-inner">
        <div class="auth-copy-panel">
          <p class="auth-eyebrow">新用户注册</p>
          <h1>
            <span class="auth-title-line">创建账号</span>
            <span class="auth-title-accent">开始记录学习</span>
          </h1>
          <p class="auth-lead">注册后保存你的目标、计划与练习数据。<br />支持多账号独立测试验证。</p>
          <div class="auth-meta" aria-label="注册后可使用">
            <span>🎯 学习目标</span>
            <span>✍️ 练习记录</span>
            <span>📊 进度统计</span>
          </div>
        </div>
        <div class="auth-quotes" aria-label="注册后可使用">
          <blockquote class="auth-quote">
            <p>「注册当天就生成了学习计划，适合课程设计演示。」</p>
            <footer>课程设计测试账号</footer>
          </blockquote>
          <blockquote class="auth-quote">
            <p>「练习记录和统计打通，答辩时数据链路很清晰。」</p>
            <footer>小组联调 · 2026 春季</footer>
          </blockquote>
        </div>
      </div>

      <div class="auth-brand-foot">
        <span class="auth-foot-label">课程设计演示系统</span>
        <span class="auth-foot-dot" aria-hidden="true"></span>
        <span class="auth-foot-year">2026</span>
      </div>
    </section>

    <section class="auth-form-panel">
      <span class="auth-grid-line auth-grid-line-h auth-grid-line-top" aria-hidden="true"></span>
      <span class="auth-grid-line auth-grid-line-h auth-grid-line-bottom" aria-hidden="true"></span>
      <span class="auth-grid-line auth-grid-line-v auth-grid-line-left" aria-hidden="true"></span>
      <span class="auth-grid-line auth-grid-line-v auth-grid-line-right" aria-hidden="true"></span>
      <div class="auth-card">
        <div class="auth-card-head">
          <h2>注册</h2>
          <p class="auth-sub">填写用户名与密码完成创建</p>
        </div>
        <form id="register-form">
          <div class="field">
            <label for="username">用户名</label>
            <input class="input" type="text" id="username" placeholder="用户名" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input class="input" type="password" id="password" placeholder="至少 6 位" required autocomplete="new-password" />
            <div class="form-hint">密码至少 6 位字符</div>
          </div>
          <div class="form-error" id="register-error"></div>
          <button class="btn primary" type="submit" id="register-btn" style="width:100%;">注册</button>
        </form>
        <div class="auth-footer">
          已有账号？<a class="link" href="login.html">登录</a>
        </div>
      </div>
    </section>
  </div>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
