<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>考试信息与资源管理｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html" aria-label="返回总览">
        <span class="logo-mark"><img src="assets/brand-mark.svg" width="36" height="36" alt="" /></span>
        <span class="logo-text"><strong>备考跟踪</strong><span>学习进度管理</span></span>
      </a>
      <nav class="nav"><a class="" href="dashboard.html"><span class="nav-icon">⌂</span><span>首页</span></a>
<a class="active" href="resources.html"><span class="nav-icon">▣</span><span>考试与资源</span></a>
<a class="" href="plan.html"><span class="nav-icon">☑</span><span>学习计划</span></a>
<a class="" href="recommendations.html"><span class="nav-icon">✦</span><span>学习推荐</span></a>
<a class="" href="statistics.html"><span class="nav-icon">◫</span><span>学习统计</span></a>
<a class="" href="qa.html"><span class="nav-icon">?</span><span>题库与答疑</span></a></nav>
      <div class="sidebar-footer">备考有迹可循<br/>计划 · 进度 · 练习</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="breadcrumb">备考跟踪 / 学习工作台</div>
          <h1 class="page-title">考试与资源</h1>
          <div class="muted" style="margin-top:8px; font-size:14px;">考试大纲、历年试题、备考资料与政策公告，支持搜索筛选。</div>
        </div>
        <div class="top-actions">
          <button class="btn ghost" id="logout-btn" title="退出登录">退出</button>
        </div>
      </header>
      
<section class="card">
  <div class="tabs" id="resource-tabs">
    <button type="button" class="tab" data-tab="考试大纲">考试大纲</button>
    <button type="button" class="tab" data-tab="历年试题">历年试题</button>
    <button type="button" class="tab active" data-tab="备考资料">备考资料</button>
    <button type="button" class="tab" data-tab="政策公告">政策公告</button>
  </div>
  <div class="filter-row">
    <label class="search" style="width:360px;"><span>⌕</span><input id="resource-search" placeholder="搜索资料名称、关键词" /></label>
    <span class="filter-label">科目</span>
    <span id="resource-subject-tags" class="filter-tags"><span class="tag active" data-subject="">全部</span></span>
    <span class="muted" id="resource-count" style="margin-left:auto;font-size:13px;"></span>
  </div>
</section>
<section class="grid grid-3" id="resource-list" style="margin-top:18px;">
  <p class="muted">加载中...</p>
</section>
<section class="grid grid-2" style="margin-top:18px;">
  <div class="card"><div class="card-title"><h2>考试公告</h2><a class="link">查看更多</a></div><div class="plain-list"><div class="list-item"><span class="tag red">置顶</span><div class="task-text"><strong>2025 年国家公务员考试公告发布</strong><span>报名时间、考试科目、职位表下载入口</span></div></div><div class="list-item"><span class="tag">更新</span><div class="task-text"><strong>各地公务员考试信息汇总</strong><span>持续更新省考、事业单位、选调生信息</span></div></div></div></div>
  <div class="card"><div class="card-title"><h2>资源管理入口</h2><small>管理员视图</small></div><div class="grid grid-3"><button class="btn primary">上传资源</button><button class="btn ghost">新建分类</button><button class="btn ghost">批量管理</button></div><p class="muted">该区域可作为课程项目中的资源增删改查入口。</p></div>
</section>

      <p class="footer-note">资源数据来自后端 API，切换标签可筛选大纲、真题、资料与政策公告。</p>
    </main>
  </div>
  <script src="js/shell.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/resource-thumbs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
