<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>题库与练习｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html" aria-label="返回总览">
        <span class="logo-mark">公</span>
        <span class="logo-text"><strong>公考学习系统</strong><span>学习跟踪原型</span></span>
      </a>
      <nav class="nav"><a class="" href="dashboard.html"><span class="nav-icon">⌂</span><span>首页</span></a>
<a class="" href="resources.html"><span class="nav-icon">▣</span><span>考试与资源</span></a>
<a class="" href="plan.html"><span class="nav-icon">☑</span><span>学习计划</span></a>
<a class="" href="recommendations.html"><span class="nav-icon">✦</span><span>学习推荐</span></a>
<a class="" href="statistics.html"><span class="nav-icon">◫</span><span>学习统计</span></a>
<a class="active" href="qa.html"><span class="nav-icon">?</span><span>题库与答疑</span></a></nav>
      <div class="sidebar-footer">蓝白风格 · 简洁实用 · 前端静态原型<br/>适合小学期课程设计展示</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="breadcrumb">公务员考试学习跟踪系统 / 方案 A</div>
          <h1 class="page-title"><span class="title-badge">6</span>题库与练习</h1>
          <div class="muted" style="margin-top:8px; font-size:14px;">选择题库进行练习，提交答案后查看解析、答题技巧和常见误区。</div>
        </div>
        <div class="top-actions">
          <label class="search"><span>⌕</span><input placeholder="搜索任务、资料、题目" /></label>
          <button class="icon-btn" title="通知">🔔</button>
          <button class="btn ghost" id="logout-btn" title="退出登录">退出</button>
        </div>
      </header>

      <section class="card" style="margin-bottom:18px;">
        <div class="card-title"><h2>题目筛选</h2></div>
        <div class="filter-row">
          <span class="filter-label">科目</span>
          <select id="subject-filter" class="input" style="width:180px;">
            <option value="">全部科目</option>
          </select>
          <span class="filter-label">题型</span>
          <select id="type-filter" class="input" style="width:140px;">
            <option value="">全部</option>
            <option value="单选">单选</option>
            <option value="多选">多选</option>
            <option value="判断">判断</option>
          </select>
        </div>
      </section>

      <section class="grid grid-3">
        <div class="card span-2" id="question-detail">
          <p class="muted">加载题目中...</p>
        </div>
        <aside class="card">
          <div class="card-title"><h2>AI 答疑</h2><span class="tag green">模拟</span></div>
          <div class="chat" data-qa-chat>
            <div class="bubble ai">你好，我是学习助手。可以问我这道题的解析、技巧或相关知识点。</div>
          </div>
          <div class="chat-input"><input class="input" data-qa-input placeholder="请输入你的问题，例如：这道题为什么选A？"/><button class="btn primary" data-qa-send>发送</button></div>
        </aside>
      </section>

      <section class="card" style="margin-top:18px;">
        <div class="card-title"><h2>最近答题</h2></div>
        <div id="history-list"><p class="muted">加载中...</p></div>
      </section>

      <p class="footer-note">题目数据来自后端 API；答疑输入会保存为留言记录，AI 回复为规则演示。</p>
    </main>
  </div>
  <script src="assets/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/qa.js"></script>
</body>
</html>
