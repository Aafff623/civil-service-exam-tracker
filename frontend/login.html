<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 32px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .auth-logo .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(145deg, var(--primary), #58a4ff);
      font-weight: 800;
    }
    .auth-logo strong { font-size: 18px; }
    .auth-card h1 {
      text-align: center;
      font-size: 22px;
      margin: 0 0 8px;
    }
    .auth-card .muted {
      text-align: center;
      margin-bottom: 24px;
    }
    .form-error {
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
      min-height: 20px;
      margin-top: 8px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="auth-logo">
        <span class="logo-mark">公</span>
        <strong>公考学习系统</strong>
      </div>
      <h1>欢迎回来</h1>
      <p class="muted">登录后继续你的公考备考计划</p>
      <form id="login-form">
        <div class="field">
          <label>用户名</label>
          <input class="input" type="text" id="username" placeholder="请输入用户名" required />
        </div>
        <div class="field" style="margin-top:12px;">
          <label>密码</label>
          <input class="input" type="password" id="password" placeholder="请输入密码" required />
        </div>
        <div class="form-error" id="login-error"></div>
        <button class="btn primary" type="submit" id="login-btn" style="width:100%; margin-top:18px;">登录</button>
      </form>
      <div class="auth-footer">
        还没有账号？<a class="link" href="register.html">立即注册</a>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
