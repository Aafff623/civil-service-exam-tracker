<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个性化学习推荐｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html" aria-label="返回总览">
        <span class="logo-mark"><img src="assets/brand-mark.svg" width="36" height="36" alt="" /></span>
        <span class="logo-text"><strong>备考跟踪</strong><span>学习进度管理</span></span>
      </a>
      <nav class="nav"><a class="" href="dashboard.html"><span class="nav-icon">⌂</span><span>首页</span></a>
<a class="" href="resources.html"><span class="nav-icon">▣</span><span>考试与资源</span></a>
<a class="" href="plan.html"><span class="nav-icon">☑</span><span>学习计划</span></a>
<a class="active" href="recommendations.html"><span class="nav-icon">✦</span><span>学习推荐</span></a>
<a class="" href="statistics.html"><span class="nav-icon">◫</span><span>学习统计</span></a>
<a class="" href="qa.html"><span class="nav-icon">?</span><span>题库与答疑</span></a></nav>
      <div class="sidebar-footer">备考有迹可循<br/>计划 · 进度 · 练习</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="breadcrumb">备考跟踪 / 学习工作台</div>
          <h1 class="page-title">学习推荐</h1>
          <div class="muted" style="margin-top:8px; font-size:14px;">基于薄弱项与答题记录，推荐适合的资料与练习题。</div>
        </div>
        <div class="top-actions">
          <button class="btn ghost" id="logout-btn" title="退出登录">退出</button>
        </div>
      </header>
      
<section class="grid grid-3">
  <div class="card">
    <div class="card-title"><h2>薄弱模块</h2><span class="tag red">Top 3</span></div>
    <div class="bar-list" id="reco-weak-bars"><p class="muted">加载中...</p></div>
  </div>
  <div class="card">
    <div class="card-title"><h2>学习偏好</h2></div>
    <p id="reco-preferences"><span class="muted">分析偏好中...</span></p>
    <p class="muted">系统根据你的答题记录和计划进度，优先推荐弱项相关内容。</p>
  </div>
  <div class="card">
    <div class="card-title"><h2>学习目标</h2></div>
    <div class="kpi-sub" id="reco-goal-type">考试目标</div>
    <div class="kpi-value" id="reco-goal-exam">—</div>
    <div class="progress"><span id="reco-goal-progress" style="width:0%"></span></div>
    <p class="muted" id="reco-goal-desc">当前进度 —%，系统会优先推荐弱项提升内容。</p>
  </div>
</section>
<section class="card reco-section" style="margin-top:18px;">
  <div class="card-title"><h2>为你推荐</h2></div>
  <div class="reco-banner">
    <img src="assets/images/study-materials.jpg" alt="学习资料示意图" loading="lazy" width="320" height="240" />
    <p class="muted">根据你的薄弱项与答题记录，智能匹配资料与练习题 📌</p>
  </div>
  <div class="reco-list" id="reco-list"><p class="muted">加载中...</p></div>
</section>
      <p class="footer-note">推荐内容根据答题弱项与计划进度实时生成。</p>
    </main>
  </div>
  <script src="js/shell.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/mock-api.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/recommendations.js"></script>
</body>
</html>
