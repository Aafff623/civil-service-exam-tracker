<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学习进度跟踪与统计分析｜公务员考试学习跟踪系统</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html" aria-label="返回总览">
        <span class="logo-mark"><img src="assets/brand-mark.svg" width="36" height="36" alt="" /></span>
        <span class="logo-text"><strong>备考跟踪</strong><span>学习进度管理</span></span>
      </a>
      <nav class="nav"><a class="" href="dashboard.html"><span class="nav-icon">⌂</span><span>首页</span></a>
<a class="" href="resources.html"><span class="nav-icon">▣</span><span>考试与资源</span></a>
<a class="" href="plan.html"><span class="nav-icon">☑</span><span>学习计划</span></a>
<a class="" href="recommendations.html"><span class="nav-icon">✦</span><span>学习推荐</span></a>
<a class="active" href="statistics.html"><span class="nav-icon">◫</span><span>学习统计</span></a>
<a class="" href="qa.html"><span class="nav-icon">?</span><span>题库与答疑</span></a></nav>
      <div class="sidebar-footer">备考有迹可循<br/>计划 · 进度 · 练习</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="breadcrumb">备考跟踪 / 学习工作台</div>
          <h1 class="page-title">学习统计</h1>
          <div class="muted" style="margin-top:8px; font-size:14px;">学习进度、做题正确率、科目完成度与连续打卡。</div>
        </div>
        <div class="top-actions">
          <button class="btn ghost" id="logout-btn" title="退出登录">退出</button>
        </div>
      </header>
      
<section class="grid grid-5">
  <div class="kpi"><div class="kpi-label">总学习时长</div><div class="kpi-value" id="kpi-hours">—<small>h</small></div><div class="kpi-sub" id="kpi-hours-delta">加载中...</div></div>
  <div class="kpi"><div class="kpi-label">完成任务数</div><div class="kpi-value" id="kpi-tasks">—</div><div class="kpi-sub" id="kpi-plan-rate">完成率 —</div></div>
  <div class="kpi"><div class="kpi-label">做题正确率</div><div class="kpi-value" id="kpi-accuracy">—<small>%</small></div><div class="kpi-sub" id="kpi-accuracy-delta">较上周 —</div></div>
  <div class="kpi"><div class="kpi-label">答题总数</div><div class="kpi-value" id="kpi-answers">—</div><div class="kpi-sub">累计做题记录</div></div>
  <div class="kpi"><div class="kpi-label">连续打卡</div><div class="kpi-value" id="kpi-streak">—<small>天</small></div><div class="kpi-sub" id="kpi-max-streak">最长连续 — 天</div></div>
</section>
<section class="grid grid-2" style="margin-top:18px;">
  <div class="card">
    <div class="card-title"><h2>学习时长趋势</h2><small>近 7 天</small></div>
    <div class="mini-chart" id="study-chart"></div>
  </div>
  <div class="card">
    <div class="card-title"><h2>科目完成度</h2><small>按学习计划任务统计</small></div>
    <div class="bar-list" id="subject-bars"><p class="muted">加载中...</p></div>
  </div>
</section>
<section class="grid grid-2" style="margin-top:18px;">
  <div class="card">
    <div class="card-title"><h2>正确率趋势</h2><small>按天统计</small></div>
    <div class="mini-chart" id="accuracy-chart"></div>
  </div>
  <div class="card">
    <div class="card-title"><h2>打卡日历</h2><small id="calendar-title">本月</small></div>
    <div class="calendar" id="calendar-grid"></div>
  </div>
</section>

      <p class="footer-note">统计数据来自学习计划完成记录与答题历史。</p>
    </main>
  </div>
  <script src="js/shell.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/statistics.js"></script>
</body>
</html>
